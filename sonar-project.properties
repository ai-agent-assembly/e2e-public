sonar.host.url=https://sonarcloud.io
sonar.projectKey=ai-agent-assembly_e2e-public
sonar.organization=ai-agent-assembly

# Name and version displayed in the SonarCloud UI.
sonar.projectName=e2e-public
sonar.projectVersion=0.0.1

# Paths are relative to this file. Replace "\" with "/" on Windows.
sonar.projectBaseDir=./
sonar.sources=src/
sonar.tests=tests/

sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Copy-paste detection: the per-SDK build/install/run harness is intentionally
# re-inlined across the behavioral with-core/without-core suites (each test file
# is kept self-contained so the parallel per-SDK PRs never collide on a shared
# fixture). That duplication is by design, so exclude test code from CPD.
sonar.cpd.exclusions=tests/**
