[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aasm-verify"
version = "0.0.1"
description = "Public integration verification CLI for Agent Assembly"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
aasm-verify = "aasm_verify.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/aasm_verify"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-xdist>=3.0",
    "ruff>=0.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
