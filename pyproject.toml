[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aasm-verify"
version = "0.0.1"
description = "Public integration verification CLI for Agent Assembly"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
# Opt-in extra for the dashboard browser smoke (AAASM-3154 AC3): installs
# Playwright so `tests/dashboard/test_browser_smoke.py` can launch headless
# Chromium. Not a default dependency — a plain `uv sync` stays browser-free and
# the smoke skip-guards on its absence (AAASM-3146). After installing, run
# `playwright install chromium` to fetch the browser binary.
browser = ["playwright>=1.50"]

[project.scripts]
aasm-verify = "aasm_verify.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/aasm_verify"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-json-report>=1.5",
    "pytest-xdist>=3.0",
    "ruff>=0.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Live-core tests build + run aa-runtime / aa-gateway from source — opt in with `-m live`.
addopts = "-m 'not live'"
markers = [
    "runtime: Runtime CLI smoke tests",
    "sdk: SDK init smoke tests (Python, Node.js, Go)",
    "examples: Examples repo smoke tests",
    "conformance: Policy allow/deny conformance smoke tests",
    "release: Release artifact and registry install verification tests",
    "live: Live-core tests that build and run aa-runtime / aa-gateway from source",
    "e2e: Live SDK→runtime policy enforcement end-to-end tests",
    "compat: Cross-version runtime×SDK compatibility matrix tests",
]

[tool.ruff]
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
