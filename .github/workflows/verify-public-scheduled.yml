name: Verify Public Stack (Scheduled)

on:
  workflow_dispatch:  # ad-hoc runs; always runs in latest mode
  schedule:
    - cron: "0 2 1,15 * *"  # 1st and 15th of each month at 02:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: "Verify [${{ matrix.area }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write  # report-failure.sh opens a GitHub issue per failing area

    # Shared by the run + summarize steps so the failure summary reads the report.
    env:
      PYTEST_JSON: /tmp/pytest-report-${{ matrix.area }}.json
    strategy:
      fail-fast: false
      matrix:
        area: [runtime, sdk, examples, install, conformance]

    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run verification (${{ matrix.area }})
        env:
          AREA: ${{ matrix.area }}
        run: |
          uv run --frozen aasm-verify public --mode latest --area "$AREA"

      - name: Summarize run on failure
        if: failure()
        env:
          AREA:    ${{ matrix.area }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash scripts/summarize-run.sh \
            --area    "$AREA" \
            --mode    latest \
            --run-url "$RUN_URL" \
            --output  /tmp/summary-"$AREA".json

      - name: Report failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AREA:         ${{ matrix.area }}
        run: |
          bash scripts/report-failure.sh \
            --summary /tmp/summary-"$AREA".json
