name: Verify Profiles (reusable)

# Reusable verification workflow (AAASM-3160). Encapsulates the five CI
# validation profiles so callers (the `verify.yml` dispatcher, scheduled runs,
# or other workflows) select a profile by name instead of duplicating job
# bodies. Each profile runs the `aasm-verify doctor` preflight first so the
# environment's per-area capability is visible in the log before any build or
# network work, then invokes a real `aasm-verify` / pytest command and uploads
# its reports as a per-profile artifact.
#
# Profiles (see docs/ci-profiles.md):
#   smoke     — doctor + runtime/sdk/conformance at latest source refs (fast).
#   full      — every area at latest source refs + rendered report (strict).
#   live      — builds + runs aa-gateway/aa-runtime from source (-m live).
#   release   — registry installs + release pytest suite for a version (strict).
#   dashboard — examples area with a real browser for dashboard screenshots.
#
# Expensive profiles (full/live/release/dashboard) are opt-in: the dispatcher
# only schedules `smoke`, and the deeper profiles run on demand or on their own
# schedule. Profiles whose host capability is missing (no browser for
# dashboard, no cargo/protoc for live) skip cleanly rather than hard-fail —
# the doctor preflight makes the reason explicit.

on:
  workflow_call:
    inputs:
      profile:
        description: "Validation profile: smoke | full | live | release | dashboard"
        required: true
        type: string
      area:
        description: "Area selector for smoke/full (all | runtime | sdk | examples | install | conformance)"
        required: false
        default: "all"
        type: string
      agent_assembly_ref:
        description: "agent-assembly ref (branch/tag/SHA)"
        required: false
        default: "master"
        type: string
      python_sdk_ref:
        description: "python-sdk ref (branch/tag/SHA)"
        required: false
        default: "master"
        type: string
      node_sdk_ref:
        description: "node-sdk ref (branch/tag/SHA)"
        required: false
        default: "master"
        type: string
      go_sdk_ref:
        description: "go-sdk ref (branch/tag/SHA)"
        required: false
        default: "master"
        type: string
      examples_ref:
        description: "agent-assembly-examples ref (branch/tag/SHA)"
        required: false
        default: "master"
        type: string
      release_version:
        description: "Version under test for the release profile, e.g. 0.0.1"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # smoke — fast confidence: doctor + runtime + sdk + conformance at latest
  # source refs. Default scheduled/PR-style lane; no heavy toolchain build.
  # ---------------------------------------------------------------------------
  smoke:
    name: "smoke"
    if: ${{ inputs.profile == 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCTOR_JSON: /tmp/aasm-reports/doctor.json
      PYTEST_JSON: /tmp/aasm-reports/pytest-smoke.json
    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Preflight (aasm-verify doctor)
        run: |
          mkdir -p /tmp/aasm-reports
          # Advisory: doctor exits non-zero only when a required capability is
          # FAIL. Keep going so the smoke areas (which skip cleanly when their
          # artifact is absent) still run and the JSON is always captured.
          uv run --frozen aasm-verify doctor --json | tee "$DOCTOR_JSON" || true

      - name: Smoke verification (runtime + sdk + conformance)
        env:
          AA_REF:         ${{ inputs.agent_assembly_ref }}
          PYTHON_SDK_REF: ${{ inputs.python_sdk_ref }}
          NODE_SDK_REF:   ${{ inputs.node_sdk_ref }}
          GO_SDK_REF:     ${{ inputs.go_sdk_ref }}
        run: |
          for area in runtime sdk conformance; do
            uv run --frozen aasm-verify public \
              --mode latest \
              --area "$area" \
              --agent-assembly-ref "$AA_REF" \
              --python-sdk-ref "$PYTHON_SDK_REF" \
              --node-sdk-ref "$NODE_SDK_REF" \
              --go-sdk-ref "$GO_SDK_REF" \
              --json-report "/tmp/aasm-reports/pytest-$area.json"
          done

      - name: Upload smoke reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-smoke-reports
          path: /tmp/aasm-reports/
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # full — every area at latest source refs, plus a rendered report. Strict:
  # AASM_VERIFY_STRICT=1 turns skip-tolerated gaps into failures (AAASM-3155).
  # ---------------------------------------------------------------------------
  full:
    name: "full"
    if: ${{ inputs.profile == 'full' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AASM_VERIFY_STRICT: "1"
      DOCTOR_JSON: /tmp/aasm-reports/doctor.json
      PYTEST_JSON: /tmp/aasm-reports/pytest-full.json
    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "stable"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: latest

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Preflight (aasm-verify doctor)
        run: |
          mkdir -p /tmp/aasm-reports
          uv run --frozen aasm-verify doctor --json | tee "$DOCTOR_JSON" || true

      - name: Full verification (${{ inputs.area }})
        env:
          AREA:           ${{ inputs.area }}
          AA_REF:         ${{ inputs.agent_assembly_ref }}
          PYTHON_SDK_REF: ${{ inputs.python_sdk_ref }}
          NODE_SDK_REF:   ${{ inputs.node_sdk_ref }}
          GO_SDK_REF:     ${{ inputs.go_sdk_ref }}
          EXAMPLES_REF:   ${{ inputs.examples_ref }}
        run: |
          uv run --frozen aasm-verify public \
            --mode latest \
            --area "${AREA:-all}" \
            --agent-assembly-ref "$AA_REF" \
            --python-sdk-ref "$PYTHON_SDK_REF" \
            --node-sdk-ref "$NODE_SDK_REF" \
            --go-sdk-ref "$GO_SDK_REF" \
            --examples-ref "$EXAMPLES_REF" \
            --json-report "$PYTEST_JSON"

      - name: Render report
        if: ${{ always() && hashFiles('/tmp/aasm-reports/pytest-full.json') != '' }}
        env:
          AA_REF: ${{ inputs.agent_assembly_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          uv run --frozen aasm-verify report \
            --pytest-json "$PYTEST_JSON" \
            --summary /tmp/aasm-reports/summary.json \
            --out /tmp/aasm-reports/report.md \
            --run-type manual \
            --run-url "$RUN_URL" \
            --tested-refs "agent-assembly=$AA_REF"

      - name: Upload full reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-full-reports
          path: /tmp/aasm-reports/
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # live — builds + runs aa-gateway / aa-runtime from source and drives the SDK
  # against it (-m live). Needs cargo + protoc; the live suite skips cleanly
  # when the toolchain is absent, so doctor surfaces capability up front.
  # ---------------------------------------------------------------------------
  live:
    name: "live"
    if: ${{ inputs.profile == 'live' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Strict release-readiness gate (AAASM-4477): the scheduled release lane
      # (verify-release-scheduled.yml, AAASM-4476) folds `live` in as a
      # release-readiness profile, so it honours the same strict-skip contract as
      # `release`/`full` — a "should never skip here" area surfaces as a failure,
      # not a silent pass. Shared contract name with AAASM-3160 CI profiles.
      AASM_VERIFY_STRICT: "1"
      AASM_CORE_REF: ${{ inputs.agent_assembly_ref }}
      DOCTOR_JSON: /tmp/aasm-reports/doctor.json
      # Point the live framework drivers at the SDK checkouts cloned below so the
      # Node / Go AAASM-3525 framework smokes locate a *built* SDK (instead of
      # skipping for "SDK checkout not found"). The Python SDK is installed into
      # the uv venv directly (in-process `import agent_assembly`), so it needs no
      # dir override — only Node/Go drivers resolve a sibling SDK directory.
      AASM_NODE_SDK_DIR: /tmp/aa-sdks/node-sdk
      AASM_GO_SDK_DIR: /tmp/aa-sdks/go-sdk
    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "stable"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: latest

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python dependencies
        run: uv sync --frozen

      # ---- Make the SDKs available to the live framework smokes (AAASM-3531) ----
      # The AAASM-3525 framework live tests do an in-process `import agent_assembly`
      # plus `import <framework>` (Python) or drive a per-language SDK driver
      # (Node/Go). Without the SDK + frameworks present they skip — which makes the
      # framework smokes useless in CI. Install them here so the cells RUN.

      - name: Install the Python SDK (native _core) into the test venv
        # `maturin develop` builds the SDK's compiled `agent_assembly._core`
        # extension straight into the uv-managed `.venv`, exactly as the python-sdk
        # repo's own native-core-build.yml does — so the test runner's in-process
        # `import agent_assembly` / `agent_assembly._core` resolves to a real
        # native build (not a pure-Python or absent install).
        env:
          PYTHON_SDK_REF: ${{ inputs.python_sdk_ref }}
        run: |
          bash scripts/install-from-branch.sh \
            --repo python-sdk --ref "$PYTHON_SDK_REF" --dest /tmp/aa-sdks/python-sdk
          uv pip install maturin
          VIRTUAL_ENV="$PWD/.venv" uv run --no-sync maturin develop \
            --manifest-path /tmp/aa-sdks/python-sdk/native/aa-ffi-python/Cargo.toml
          uv run --no-sync python -c "import agent_assembly; from agent_assembly._core import RuntimeClient, GovernanceEvent; print('agent_assembly + _core importable')"

      - name: Install the Python AI-agent frameworks
        # The `frameworks` extra (pyproject.toml) installs the AAASM-3525 Python
        # frameworks (langchain, langgraph, pydantic-ai, crewai, google-adk, mcp,
        # openai-agents, microsoft-agent-framework) into the same venv so each
        # `test_framework_python_*` cell runs its allow path instead of skipping on
        # a missing framework import.
        #
        # `--prerelease=allow` is required because `agent-framework` (AAASM-3538)
        # pulls pre-release sub-distributions; uv refuses pre-releases by default,
        # so the whole extra fails to resolve without it.
        run: uv pip install --prerelease=allow -e '.[frameworks]'

      - name: Build the Node SDK for the live framework drivers
        # The Node framework drivers resolve a *built* node-sdk: `pnpm build`
        # produces dist/esm/native/client.js and `pnpm native:build` the
        # native/aa-ffi-node/index.cjs binding the real SDK→aa-ffi→aa-runtime path
        # needs. AASM_NODE_SDK_DIR (set above) points the locator here.
        env:
          NODE_SDK_REF: ${{ inputs.node_sdk_ref }}
        run: |
          bash scripts/install-from-branch.sh \
            --repo node-sdk --ref "$NODE_SDK_REF" --dest "$AASM_NODE_SDK_DIR"
          pnpm --dir "$AASM_NODE_SDK_DIR" install
          pnpm --dir "$AASM_NODE_SDK_DIR" build
          pnpm --dir "$AASM_NODE_SDK_DIR" native:build

      - name: Build the Go SDK cgo FFI library for the live framework driver
        # The Go framework driver links the go-sdk under the `aa_ffi_go` cgo tag
        # against libaa_ffi_go; without that compiled library the SDK falls back to
        # a simulated UDS that never reaches a real core, so the driver skips.
        # Build it (Makefile `native` target) so AASM_GO_SDK_DIR resolves a real lib.
        env:
          GO_SDK_REF: ${{ inputs.go_sdk_ref }}
        run: |
          bash scripts/install-from-branch.sh \
            --repo go-sdk --ref "$GO_SDK_REF" --dest "$AASM_GO_SDK_DIR"
          make -C "$AASM_GO_SDK_DIR" native

      - name: Preflight (aasm-verify doctor)
        run: |
          mkdir -p /tmp/aasm-reports
          uv run --frozen aasm-verify doctor --json | tee "$DOCTOR_JSON" || true

      - name: Live-core tests (-m live)
        # With the SDKs + frameworks installed above, the AAASM-3525 framework
        # smokes RUN (allow paths assert, deny paths strict-xfail) rather than
        # skip. The remaining live suite still skips cleanly if a capability is
        # genuinely absent. --json-report captures the outcome for the artifact.
        run: |
          uv run --no-sync pytest -m live -v --tb=short \
            --json-report --json-report-file=/tmp/aasm-reports/pytest-live.json

      - name: Render report (enforce AASM_VERIFY_STRICT skip-audit)
        # AAASM-4700: the `report` subcommand is the ONLY code that reads
        # AASM_VERIFY_STRICT and fails the run on an un-justified strict skip.
        # The `pytest -m live` step above never consults it, so without this step
        # the strict env var set on this job is inert. Running `aasm-verify report`
        # over the live JSON turns the strict-skip contract into a real gate (a
        # "should never skip here" area now fails instead of silently passing),
        # matching the `full` profile. `always()` so a failing live suite is still
        # summarized; a strict violation here fails the job (no continue-on-error).
        if: ${{ always() && hashFiles('/tmp/aasm-reports/pytest-live.json') != '' }}
        env:
          AA_REF: ${{ inputs.agent_assembly_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          uv run --no-sync aasm-verify report \
            --pytest-json /tmp/aasm-reports/pytest-live.json \
            --summary /tmp/aasm-reports/summary.json \
            --out /tmp/aasm-reports/report.md \
            --run-type manual \
            --run-url "$RUN_URL" \
            --tested-refs "agent-assembly=$AA_REF"

      - name: Upload live reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-live-reports
          path: /tmp/aasm-reports/
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # release — verifies published registry packages + GitHub release artifacts
  # for a provided version. Strict (AASM_VERIFY_STRICT=1): a missing artifact is
  # a failure, not a skip. Skips cleanly only when no version is provided.
  # ---------------------------------------------------------------------------
  release:
    name: "release"
    if: ${{ inputs.profile == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AASM_VERIFY_STRICT: "1"
      DOCTOR_JSON: /tmp/aasm-reports/doctor.json
    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.release_version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "Error: the release profile requires 'release_version' (e.g. 0.0.1)." >&2
            exit 1
          fi

      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "stable"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Preflight (aasm-verify doctor)
        run: |
          mkdir -p /tmp/aasm-reports
          uv run --frozen aasm-verify doctor --json | tee "$DOCTOR_JSON" || true

      - name: Install published SDKs from registries
        env:
          VERSION: ${{ inputs.release_version }}
        run: |
          bash scripts/install-from-release.sh --repo python-sdk --version "$VERSION"
          bash scripts/install-from-release.sh --repo node-sdk --version "$VERSION"
          bash scripts/install-from-release.sh --repo go-sdk --version "$VERSION"

      - name: Release verification suite
        env:
          AASM_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          uv run --frozen pytest -m release -v --tb=short \
            --json-report --json-report-file=/tmp/aasm-reports/pytest-release.json

      - name: Render report (enforce AASM_VERIFY_STRICT skip-audit)
        # AAASM-4700: mirror the `full`/`live` gate — `aasm-verify report` is the
        # only code that honours AASM_VERIFY_STRICT and fails on an un-justified
        # strict skip. The `pytest -m release` step never reads it, so without this
        # the strict env var set on this job is inert. Gating here makes a missing
        # release artifact surfacing as a skip a real failure, not a silent pass.
        if: ${{ always() && hashFiles('/tmp/aasm-reports/pytest-release.json') != '' }}
        env:
          VERSION: ${{ inputs.release_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          uv run --frozen aasm-verify report \
            --pytest-json /tmp/aasm-reports/pytest-release.json \
            --summary /tmp/aasm-reports/summary.json \
            --out /tmp/aasm-reports/report.md \
            --run-type release \
            --run-url "$RUN_URL" \
            --tested-refs "version=$VERSION"

      - name: Upload release reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-release-reports
          path: /tmp/aasm-reports/
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # dashboard — examples area with a real browser for dashboard screenshots.
  # Installs Playwright Chromium so the browser-gated checks run; where a
  # browser cannot be provisioned the doctor 'browser' capability warns and the
  # screenshot tests skip cleanly rather than fail the job.
  # ---------------------------------------------------------------------------
  dashboard:
    name: "dashboard"
    if: ${{ inputs.profile == 'dashboard' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCTOR_JSON: /tmp/aasm-reports/doctor.json
      PYTEST_JSON: /tmp/aasm-reports/pytest-dashboard.json
    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: latest

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        # Best-effort: when the browser cannot be provisioned the doctor
        # 'browser' capability warns and the dashboard screenshot tests skip
        # cleanly, so a failure here must not fail the whole profile.
        run: |
          uv run --frozen python -m playwright install --with-deps chromium || \
            echo "Playwright Chromium install failed; dashboard screenshots will skip."

      - name: Preflight (aasm-verify doctor)
        run: |
          mkdir -p /tmp/aasm-reports
          uv run --frozen aasm-verify doctor --json | tee "$DOCTOR_JSON" || true

      - name: Dashboard examples verification
        env:
          EXAMPLES_REF: ${{ inputs.examples_ref }}
        run: |
          uv run --frozen aasm-verify public \
            --mode latest \
            --area examples \
            --examples-ref "$EXAMPLES_REF" \
            --json-report "$PYTEST_JSON"

      - name: Upload dashboard reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-dashboard-reports
          path: /tmp/aasm-reports/
          if-no-files-found: warn
          retention-days: 14
