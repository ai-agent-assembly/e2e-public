name: Verify Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      aasm_release_version:
        description: "Product version for GitHub Release artifact tests, e.g. 0.0.1"
        required: false
        default: ""
      python_sdk_version:
        description: "python-sdk PyPI version, e.g. 0.1.0"
        required: false
        default: ""
      node_sdk_version:
        description: "node-sdk npm version, e.g. 0.1.0"
        required: false
        default: ""
      go_sdk_version:
        description: "go-sdk module version, e.g. v0.1.0"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  verify-release:
    name: Verify public SDK install paths from registries
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "stable"

      - name: Resolve versions (dispatch inputs or release tag)
        id: versions
        env:
          DISPATCH_AASM:    ${{ inputs.aasm_release_version }}
          DISPATCH_PYTHON:  ${{ inputs.python_sdk_version }}
          DISPATCH_NODE:    ${{ inputs.node_sdk_version }}
          DISPATCH_GO:      ${{ inputs.go_sdk_version }}
          RELEASE_TAG:      ${{ github.event.release.tag_name }}
        run: |
          # Sanitize RELEASE_TAG: strip any newlines to prevent GITHUB_OUTPUT injection.
          SAFE_TAG="${RELEASE_TAG//$'\n'/}"
          SAFE_TAG="${SAFE_TAG//$'\r'/}"

          # On release publish, derive bare version from the tag (strip leading 'v' for PyPI/npm).
          if [ -n "$SAFE_TAG" ]; then
            BARE="${SAFE_TAG#v}"
            AASM_VER="${DISPATCH_AASM:-$BARE}"
            PY_VER="${DISPATCH_PYTHON:-$BARE}"
            NODE_VER="${DISPATCH_NODE:-$BARE}"
            GO_VER="${DISPATCH_GO:-$SAFE_TAG}"
          else
            AASM_VER="${DISPATCH_AASM}"
            PY_VER="${DISPATCH_PYTHON}"
            NODE_VER="${DISPATCH_NODE}"
            GO_VER="${DISPATCH_GO}"
          fi

          # Write outputs using the heredoc delimiter format to guard against
          # any residual newline-injection in the values.
          {
            printf 'aasm_release_version<<GH_DELIM\n%s\nGH_DELIM\n' "$AASM_VER"
            printf 'python_sdk_version<<GH_DELIM\n%s\nGH_DELIM\n' "$PY_VER"
            printf 'node_sdk_version<<GH_DELIM\n%s\nGH_DELIM\n' "$NODE_VER"
            printf 'go_sdk_version<<GH_DELIM\n%s\nGH_DELIM\n' "$GO_VER"
          } >> "$GITHUB_OUTPUT"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install Python SDK from PyPI
        if: ${{ steps.versions.outputs.python_sdk_version != '' }}
        env:
          PYTHON_SDK_VERSION: ${{ steps.versions.outputs.python_sdk_version }}
        run: |
          bash scripts/install-from-release.sh --repo python-sdk --version "$PYTHON_SDK_VERSION"

      - name: Install Node SDK from npm
        if: ${{ steps.versions.outputs.node_sdk_version != '' }}
        env:
          NODE_SDK_VERSION: ${{ steps.versions.outputs.node_sdk_version }}
        run: |
          bash scripts/install-from-release.sh --repo node-sdk --version "$NODE_SDK_VERSION"

      - name: Install Go SDK from module proxy
        if: ${{ steps.versions.outputs.go_sdk_version != '' }}
        env:
          GO_SDK_VERSION: ${{ steps.versions.outputs.go_sdk_version }}
        run: |
          bash scripts/install-from-release.sh --repo go-sdk --version "$GO_SDK_VERSION"

      - name: Run release pytest suite
        env:
          AASM_RELEASE_VERSION: ${{ steps.versions.outputs.aasm_release_version }}
        run: |
          uv sync
          uv run pytest -m release -v --tb=short

      - name: Summary
        env:
          AASM_VER:   ${{ steps.versions.outputs.aasm_release_version }}
          PYTHON_VER: ${{ steps.versions.outputs.python_sdk_version }}
          NODE_VER:   ${{ steps.versions.outputs.node_sdk_version }}
          GO_VER:     ${{ steps.versions.outputs.go_sdk_version }}
        run: |
          echo "## Release verification complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Channel | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| agent-assembly (GitHub Release) | ${AASM_VER:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| python-sdk (PyPI)               | ${PYTHON_VER:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| node-sdk (npm)                  | ${NODE_VER:-skipped}   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| go-sdk (module proxy)           | ${GO_VER:-skipped}     |" >> "$GITHUB_STEP_SUMMARY"
