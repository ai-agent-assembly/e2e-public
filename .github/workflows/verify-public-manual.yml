name: Verify Public Stack (Manual)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Verification mode"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
          - tag
          - release
      test_group:
        description: "Test group to run (or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - runtime
          - sdk
          - examples
          - install
          - conformance
      agent_assembly_ref:
        description: "agent-assembly ref (branch/tag/SHA)"
        required: false
        default: "master"
      python_sdk_ref:
        description: "python-sdk ref (branch/tag/SHA)"
        required: false
        default: "master"
      node_sdk_ref:
        description: "node-sdk ref (branch/tag/SHA)"
        required: false
        default: "master"
      go_sdk_ref:
        description: "go-sdk ref (branch/tag/SHA)"
        required: false
        default: "master"
      examples_ref:
        description: "examples ref (branch/tag/SHA)"
        required: false
        default: "master"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    name: Resolve test areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      areas: ${{ steps.select.outputs.areas }}
    steps:
      # Build the matrix from inputs.test_group. Doing this in a setup job (rather
      # than a job-level `if` on the verify matrix) avoids referencing the `matrix`
      # context where it is not available, which previously caused a startup_failure.
      - name: Select areas from test_group
        id: select
        env:
          TEST_GROUP: ${{ inputs.test_group }}
        run: |
          if [ -z "$TEST_GROUP" ] || [ "$TEST_GROUP" = "all" ]; then
            echo 'areas=["runtime","sdk","examples","install","conformance"]' >> "$GITHUB_OUTPUT"
          else
            echo "areas=[\"$TEST_GROUP\"]" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: "Verify [${{ matrix.area }}]"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    # Shared by the run + summarize steps so the failure summary reads the report.
    env:
      PYTEST_JSON: /tmp/pytest-report-${{ matrix.area }}.json
    strategy:
      fail-fast: false
      matrix:
        area: ${{ fromJSON(needs.setup.outputs.areas) }}

    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv==0.11.31 --only-binary=':all:' --quiet

      - name: Install Python dependencies
        run: uv sync --locked --no-build --no-binary-package aasm-verify

      - name: Run verification (${{ matrix.area }})
        env:
          AREA:           ${{ matrix.area }}
          MODE:           ${{ inputs.mode || 'latest' }}
          AA_REF:         ${{ inputs.agent_assembly_ref || 'master' }}
          PYTHON_SDK_REF: ${{ inputs.python_sdk_ref || 'master' }}
          NODE_SDK_REF:   ${{ inputs.node_sdk_ref || 'master' }}
          GO_SDK_REF:     ${{ inputs.go_sdk_ref || 'master' }}
          EXAMPLES_REF:   ${{ inputs.examples_ref || 'master' }}
        run: |
          uv run --locked --no-build --no-binary-package aasm-verify aasm-verify public \
            --mode             "$MODE" \
            --area             "$AREA" \
            --agent-assembly-ref "$AA_REF" \
            --python-sdk-ref   "$PYTHON_SDK_REF" \
            --node-sdk-ref     "$NODE_SDK_REF" \
            --go-sdk-ref       "$GO_SDK_REF" \
            --examples-ref     "$EXAMPLES_REF"

      - name: Summarize run on failure
        if: failure()
        env:
          AREA:    ${{ matrix.area }}
          MODE:    ${{ inputs.mode || 'latest' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash scripts/summarize-run.sh \
            --area    "$AREA" \
            --mode    "$MODE" \
            --run-url "$RUN_URL" \
            --output  /tmp/summary-"$AREA".json

      - name: Report failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AREA:         ${{ matrix.area }}
        run: |
          bash scripts/report-failure.sh \
            --summary /tmp/summary-"$AREA".json
