name: Verify Latest

on:
  schedule:
    - cron: "0 2 * * 3,6"  # Every Wednesday and Saturday at 02:00 UTC
  workflow_dispatch:
    inputs:
      agent_assembly_ref:
        description: "agent-assembly branch/tag/SHA (default: master)"
        required: false
        default: "master"
      python_sdk_ref:
        description: "python-sdk branch/tag/SHA (default: master)"
        required: false
        default: "master"
      node_sdk_ref:
        description: "node-sdk branch/tag/SHA (default: master)"
        required: false
        default: "master"
      go_sdk_ref:
        description: "go-sdk branch/tag/SHA (default: master)"
        required: false
        default: "master"
      examples_ref:
        description: "agent-assembly-examples branch/tag/SHA (default: master)"
        required: false
        default: "master"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-latest:
    name: Verify public stack at latest base branches
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "stable"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: latest

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run install smoke test (agent-assembly)
        env:
          AA_REF: ${{ inputs.agent_assembly_ref || 'master' }}
        run: bash tests/install/smoke-test-rust-build.sh

      - name: Run SDK smoke tests
        env:
          PYTHON_SDK_REF: ${{ inputs.python_sdk_ref || 'master' }}
          NODE_SDK_REF: ${{ inputs.node_sdk_ref || 'master' }}
          GO_SDK_REF: ${{ inputs.go_sdk_ref || 'master' }}
        run: |
          bash tests/sdk/smoke-test-python-sdk.sh
          bash tests/sdk/smoke-test-node-sdk.sh
          bash tests/sdk/smoke-test-go-sdk.sh

      - name: Run examples smoke test
        env:
          EXAMPLES_REF: ${{ inputs.examples_ref || 'master' }}
        run: bash tests/examples/smoke-test-examples.sh

      - name: Run conformance smoke test
        env:
          AA_REF: ${{ inputs.agent_assembly_ref || 'master' }}
        run: bash tests/conformance/smoke-test-conformance.sh
