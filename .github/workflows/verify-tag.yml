name: Verify Tag

on:
  workflow_dispatch:
    inputs:
      agent_assembly_tag:
        description: "agent-assembly tag, e.g. v0.1.0"
        required: false
        default: ""
      python_sdk_tag:
        description: "python-sdk tag, e.g. v0.1.0"
        required: false
        default: ""
      node_sdk_tag:
        description: "node-sdk tag, e.g. v0.1.0"
        required: false
        default: ""
      go_sdk_tag:
        description: "go-sdk tag, e.g. v0.1.0"
        required: false
        default: ""
      examples_tag:
        description: "agent-assembly-examples tag, e.g. v0.1.0"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify public stack at exact git tags
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout integration-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Validate tag inputs (at least one must be provided)
        env:
          AA_TAG:       ${{ inputs.agent_assembly_tag }}
          PY_TAG:       ${{ inputs.python_sdk_tag }}
          NODE_TAG:     ${{ inputs.node_sdk_tag }}
          GO_TAG:       ${{ inputs.go_sdk_tag }}
          EXAMPLES_TAG: ${{ inputs.examples_tag }}
        run: |
          if [ -z "$AA_TAG" ] && [ -z "$PY_TAG" ] && [ -z "$NODE_TAG" ] && [ -z "$GO_TAG" ] && [ -z "$EXAMPLES_TAG" ]; then
            echo "Error: at least one tag input must be provided." >&2
            exit 1
          fi

      - name: Set up Rust
        if: ${{ inputs.agent_assembly_tag != '' }}
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Set up Python
        if: ${{ inputs.python_sdk_tag != '' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Node.js
        if: ${{ inputs.node_sdk_tag != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: Install pnpm
        if: ${{ inputs.node_sdk_tag != '' }}
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: latest

      - name: Set up Go
        if: ${{ inputs.go_sdk_tag != '' }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "stable"

      - name: Install protobuf compiler
        if: ${{ inputs.agent_assembly_tag != '' || inputs.python_sdk_tag != '' || inputs.node_sdk_tag != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Verify agent-assembly at tag
        if: ${{ inputs.agent_assembly_tag != '' }}
        env:
          AA_REF: ${{ inputs.agent_assembly_tag }}
        run: bash tests/install/smoke-test-rust-build.sh

      - name: Verify python-sdk at tag
        if: ${{ inputs.python_sdk_tag != '' }}
        env:
          PYTHON_SDK_REF: ${{ inputs.python_sdk_tag }}
        run: bash tests/sdk/smoke-test-python-sdk.sh

      - name: Verify node-sdk at tag
        if: ${{ inputs.node_sdk_tag != '' }}
        env:
          NODE_SDK_REF: ${{ inputs.node_sdk_tag }}
        run: bash tests/sdk/smoke-test-node-sdk.sh

      - name: Verify examples at tag
        if: ${{ inputs.examples_tag != '' }}
        env:
          EXAMPLES_REF: ${{ inputs.examples_tag }}
        run: bash tests/examples/smoke-test-examples.sh

      - name: Verify conformance vectors at agent-assembly tag
        if: ${{ inputs.agent_assembly_tag != '' }}
        env:
          AA_REF: ${{ inputs.agent_assembly_tag }}
        run: bash tests/conformance/smoke-test-conformance.sh
