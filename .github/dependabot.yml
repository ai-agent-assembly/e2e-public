version: 2
updates:
  # This project is uv-managed (uv.lock + [dependency-groups] in
  # pyproject.toml). The "pip" ecosystem does not update uv.lock — use the
  # dedicated "uv" ecosystem (GA since 2025-03) so Dependabot understands
  # pyproject.toml + uv.lock natively (AAASM-4437).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
